{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
  <h2>Bonjour {{ user.username if user else 'Utilisateur' }}</h2>
  <div class="row">
    <div class="col-md-6">
      <h4>Chat</h4>
      <div id="chat" class="border p-2" style="height:300px; overflow:auto"></div>
      <div class="input-group mt-2">
        <input id="msg" class="form-control" placeholder="Message...">
        <button id="send" class="btn btn-primary">Envoyer</button>
      </div>
    </div>
    <div class="col-md-6">
      <h4>Appel vidéo (prototype)</h4>
      <div>
        <video id="localVideo" autoplay playsinline muted style="width:100%"></video>
        <video id="remoteVideo" autoplay playsinline style="width:100%"></video>
        <div class="mt-2">
          <button id="startCall" class="btn btn-success">Démarrer appel</button>
          <button id="hangup" class="btn btn-danger">Raccrocher</button>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
{% block scripts %}
  <script>
    const SOCKET_URL = location.origin;
    const socket = io(SOCKET_URL);
    const room = "global";
    const username = "{{ user.username if user else 'guest' }}";
    socket.emit("join", {room, username});

    // chat
    const chatEl = document.getElementById("chat");
    document.getElementById("send").onclick = () => {
      const body = document.getElementById("msg").value;
      if (!body) return;
      socket.emit("chat_message", {room, username, body});
      document.getElementById("msg").value = "";
    };
    socket.on("chat_message", (data) => {
      const el = document.createElement("div");
      el.textContent = `${data.username}: ${data.body}`;
      chatEl.appendChild(el);
      chatEl.scrollTop = chatEl.scrollHeight;
    });
    socket.on("status", (data) => {
      const el = document.createElement("div");
      el.className = "text-muted small";
      el.textContent = data.msg;
      chatEl.appendChild(el);
    });

    // WebRTC signaling prototype
    let pc;
    const cfg = {iceServers: [{urls: "stun:stun.l.google.com:19302"}]};
    const localVideo = document.getElementById("localVideo");
    const remoteVideo = document.getElementById("remoteVideo");
    document.getElementById("startCall").onclick = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        localVideo.srcObject = stream;
        pc = new RTCPeerConnection(cfg);
        stream.getTracks().forEach(t => pc.addTrack(t, stream));
        pc.ontrack = e => { remoteVideo.srcObject = e.streams[0]; };
        pc.onicecandidate = e => { if (e.candidate) socket.emit("webrtc_signal", {room, from: username, type: "ice", candidate: e.candidate}); };
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit("webrtc_signal", {room, from: username, type: "offer", sdp: offer});
      } catch (err) {
        console.error('getUserMedia error', err);
        alert('Impossible d\'accéder à la caméra / micro.');
      }
    };

    socket.on("webrtc_signal", async (data) => {
      if (!pc) {
        pc = new RTCPeerConnection(cfg);
        pc.ontrack = e => { remoteVideo.srcObject = e.streams[0]; };
        pc.onicecandidate = e => { if (e.candidate) socket.emit("webrtc_signal", {room, from: username, type: "ice", candidate: e.candidate}); };
      }
      if (data.type === "offer") {
        await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
        const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        localVideo.srcObject = stream;
        stream.getTracks().forEach(t => pc.addTrack(t, stream));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit("webrtc_signal", {room, from: username, type: "answer", sdp: answer});
      } else if (data.type === "answer") {
        await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
      } else if (data.type === "ice" && data.candidate) {
        try { await pc.addIceCandidate(data.candidate); } catch(e){ console.warn('ICE add failed', e); }
      }
    });

    document.getElementById("hangup").onclick = () => {
      if (pc) { pc.close(); pc = null; }
      if (localVideo.srcObject) localVideo.srcObject.getTracks().forEach(t => t.stop());
      remoteVideo.srcObject = null;
    };
  </script>
{% endblock %}
