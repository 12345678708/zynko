<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Zynko</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">Zynko</div>

<p>👤 {{username}}</p>

<p>Code ami : {{code}}</p>

<a href="/logout">Déconnexion</a>

</div>

<div class="chat">

<div class="messages">

{% for m in messages %}

<div class="bubble {% if m[1]==username %}me{% else %}other{% endif %}">

<b>{{m[1]}}</b><br>

{{m[3]}}

</div>

{% endfor %}

</div>

<form method="post" class="send">

<input name="receiver" placeholder="Pseudo ami">

<input name="message" placeholder="Message">

<button>➤</button>

</form>

</div>

</div>

</body>
</html>
