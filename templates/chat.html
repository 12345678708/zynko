<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Zynko</title>

<link rel="stylesheet" href="/static/style.css">

<script src="/static/script.js"></script>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">Zynko</div>

<p>👤 {{username}}</p>

<p>Code ami : {{code}}</p>

<a href="/logout">Déconnexion</a>

<hr>

<form method="post" action="/add_friend">

<input name="code" placeholder="Code ami">

<button>Ajouter</button>

</form>

<hr>

{% for f in friends %}

<div class="friend" onclick="openChat('{{f[0]}}')">

<img src="/static/avatar.png">

{{f[0]}}

</div>

{% endfor %}

</div>

<div class="chat">

<div id="messages" class="messages"></div>

<form class="send" onsubmit="sendMessage(event)">

<input id="msg" placeholder="Message">

<button>Envoyer</button>

</form>

</div>

</div>

<script>

function sendMessage(e){

e.preventDefault()

let msg=document.getElementById("msg").value

fetch("/send",{

method:"POST",

headers:{"Content-Type":"application/x-www-form-urlencoded"},

body:"receiver="+currentFriend+"&message="+msg

})

document.getElementById("msg").value=""

}

</script>

</body>
</html>
