<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Zynko Chat</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<header class="topbar">

<div class="logo">
<img src="/static/avatar.png" class="avatar">
<span>Zynko</span>
</div>

<div class="user">

<span>{{username}}</span>

<button onclick="toggleMode()">🌙</button>

<a href="/logout">Logout</a>

</div>

</header>

<div class="chat-container">

<div class="messages" id="messages">

{% for m in messages %}

<div class="message">

<b>{{m[0]}}</b>

<p>{{m[1]}}</p>

{% if m[2] %}

<img src="/static/uploads/{{m[2]}}" class="image">

{% endif %}

{% if m[3] %}

<audio controls>

<source src="/static/uploads/{{m[3]}}">

</audio>

{% endif %}

</div>

{% endfor %}

</div>

<form method="POST" enctype="multipart/form-data" class="send">

<input
name="message"
placeholder="Message..."
maxlength="500"

>

<input type="file" name="image">

<input type="file" name="audio">

<button>Envoyer</button>

</form>

</div>

<script>

function toggleMode(){

document.body.classList.toggle("light")

}

setInterval(function(){

location.reload()

},3000)

</script>

</body>

</html>
