<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zynko</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="app">

<div class="sidebar">

<h2>Zynko</h2>

<p class="user">👤 {{username}}</p>

<h3>Amis</h3>

<ul>
{% for friend in friends %}
<li>
<img src="{{ friend['profile_pic'] }}" class="avatar">
{{ friend['username'] }}
</li>
{% endfor %}
</ul>

<a href="/logout" class="logout">Déconnexion</a>

</div>

<div class="chat">

<div class="messages">

{% for msg in messages %}

<div class="bubble {% if msg.sender == username %}me{% else %}other{% endif %}">
<strong>{{msg.sender}}</strong><br>
{{msg.message}}
</div>

{% endfor %}

</div>

<form method="post" class="send">

<input name="receiver" placeholder="Envoyer à">

<input name="message" placeholder="Message...">

<button type="submit">➤</button>

</form>

</div>

</div>

</body>
</html>
