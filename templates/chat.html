<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zynko</title>

<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>

<body>

<div class="app">

<div class="sidebar">
<h2>Zynko</h2>

<button onclick="createRoom()">➕ Chat</button>

<div id="rooms"></div>
</div>

<div class="chat">

<div id="header">Discussion</div>

<div id="messages"></div>

<div class="input">

<input id="msg" placeholder="Message...">

<input type="file" id="file">

<button onclick="send()">➤</button>
<button onclick="record()">🎤</button>

</div>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
