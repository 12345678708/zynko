<!DOCTYPE html>
<html>

<head>
<title>Amis - Zynko</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h2>Liste d'amis</h2>

<form method="POST">

<input name="friend" placeholder="Pseudo de l'ami">
<button>Ajouter</button>

</form>

<ul>

{% for f in friends %}

<li>
<a href="/chat?user={{f[0]}}">{{f[0]}}</a>
</li>

{% endfor %}

</ul>

<a href="/logout">Déconnexion</a>

</body>
</html>
