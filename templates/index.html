{% extends "base.html" %}

{% block title %}Zynko - Connexion{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <div class="logo">
            <i class="fas fa-network-wired"></i>
            <h1>ZYNKO</h1>
            <p>Connectez-vous avec vos amis</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Se Connecter</button>
            <button class="tab-btn" onclick="switchTab('register')">S'Inscrire</button>
        </div>

        <div id="login" class="tab-content active">
            <form method="POST" action="/login">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Pseudo</label>
                    <input type="text" name="username" placeholder="Entrez votre pseudo" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Mot de passe</label>
                    <input type="password" name="password" placeholder="Entrez votre mot de passe" required>
                </div>
                <button type="submit" class="btn-primary">Se Connecter</button>
            </form>
        </div>

        <div id="register" class="tab-content">
            <form method="POST" action="/register">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Pseudo</label>
                    <input type="text" name="username" placeholder="Choisissez un pseudo" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Mot de passe</label>
                    <input type="password" name="password" placeholder="Choisissez un mot de passe" required>
                </div>
                <button type="submit" class="btn-primary">S'Inscrire</button>
            </form>
        </div>
    </div>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');
}
</script>
{% endblock %}
